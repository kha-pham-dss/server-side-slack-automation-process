AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Slack dishes ordering - Option A (scheduled Lambdas only, reactions.get)

# Config and secrets: SSM Parameter Store (free tier). Create parameters under /slack-dishes/ before first run.
# See config/parameter-store-keys.md. Do not commit tokens.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 60
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  MenuMessageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: slack-dishes-menu-message
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: date
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  PostMenuFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-dishes-post-menu
      CodeUri: ../serverless/post-menu
      Handler: index.handler
      Description: Runs at 9:30 GMT+7 (VNT); reads menu from latest DM with menu-dm-user-id, updates sheet, posts to Slack, stores message_ts in DynamoDB.
      Environment:
        Variables:
          TABLE_NAME: !Ref MenuMessageTable
          PARAMETER_PREFIX: /slack-dishes
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes/*'
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt MenuMessageTable.Arn
      Events:
        PostMenuSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(30 2 ? * MON-FRI *)
            Name: post-menu-daily
            Description: Invoke PostMenu at 9:30 GMT+7 (VNT)
            Enabled: true

  CollectOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-dishes-collect-orders
      CodeUri: ../serverless/collect-orders
      Handler: index.handler
      Description: Runs at 10:20 GMT+7 (VNT); reads menu message from DynamoDB, calls reactions.get, resolves user_id to name (users.list), writes orders to Google Sheet by user row. Can be invoked by schedule or by SlackEvents when user replies under menu.
      Environment:
        Variables:
          TABLE_NAME: !Ref MenuMessageTable
          PARAMETER_PREFIX: /slack-dishes
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes/*'
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt MenuMessageTable.Arn
      Events:
        CollectOrdersSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(20 3 ? * MON-FRI *)
            Name: collect-orders-daily
            Description: Invoke CollectOrders at 10:20 GMT+7 (VNT)
            Enabled: true

  ZaloSheetSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-dishes-zalo-sheet-summary
      CodeUri: ../serverless/zalo-sheet-summary
      Handler: index.handler
      Description: Runs at 10:45 GMT+7 (VNT); reads sheet range (default M58:M72), reconciles Slack reactions vs sheet, sends one Zalo group message.
      Environment:
        Variables:
          PARAMETER_PREFIX: /slack-dishes
          TABLE_NAME: !Ref MenuMessageTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes/*'
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt MenuMessageTable.Arn
      Events:
        ZaloSheetSummarySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(45 3 ? * MON-FRI *)
            Name: zalo-sheet-summary-daily
            Description: Invoke Zalo sheet summary at 10:45 GMT+7 (VNT)
            Enabled: true

  SlackEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-dishes-slack-events
      CodeUri: ../serverless/slack-events
      Handler: index.handler
      Description: Receives Slack Events API; if message is a reply under today's menu post and (when configured) @-mentions Mr.Chef, invokes CollectOrders (sheet + white_check_mark).
      Environment:
        Variables:
          TABLE_NAME: !Ref MenuMessageTable
          COLLECT_ORDERS_FUNCTION_NAME: !Ref CollectOrdersFunction
          PARAMETER_PREFIX: /slack-dishes
          # Slack user id (e.g. U01ABC…) for Mr.Chef; menu-thread replies must @-mention this user to trigger CollectOrders. Override SSM /slack-dishes/mr-chef-user-id when non-empty.
          MR_CHEF_SLACK_USER_ID: ''
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes/*'
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt MenuMessageTable.Arn
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt CollectOrdersFunction.Arn
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowMethods:
            - POST
          AllowHeaders:
            - '*'

Outputs:
  MenuMessageTableName:
    Description: DynamoDB table for menu message metadata
    Value: !Ref MenuMessageTable
    Export:
      Name: !Sub '${AWS::StackName}-MenuMessageTable'
  PostMenuFunctionArn:
    Description: PostMenu Lambda ARN
    Value: !GetAtt PostMenuFunction.Arn
  CollectOrdersFunctionArn:
    Description: CollectOrders Lambda ARN
    Value: !GetAtt CollectOrdersFunction.Arn
  ZaloSheetSummaryFunctionArn:
    Description: Zalo sheet summary Lambda ARN
    Value: !GetAtt ZaloSheetSummaryFunction.Arn
  SlackEventsFunctionUrl:
    Description: Slack Events API Request URL - set this in Slack app Event Subscriptions
    Value: !GetAtt SlackEventsFunctionUrl.FunctionUrl
  SlackEventsFunctionArn:
    Description: SlackEvents Lambda ARN
    Value: !GetAtt SlackEventsFunction.Arn
