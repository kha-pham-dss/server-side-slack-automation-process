AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Slack dishes ordering - Option A (scheduled Lambdas only, reactions.get)

# Config and secrets: SSM Parameter Store (free tier). Create parameters under /slack-dishes/ before first run.
# See config/parameter-store-keys.md. Do not commit tokens.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 60
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  MenuMessageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: slack-dishes-menu-message
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: date
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  PostMenuFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-dishes-post-menu
      CodeUri: ../serverless/post-menu
      Handler: index.handler
      Description: Runs at 9:30 GMT+7 (VNT); fetches dishes from Google Sheet (dish-range), posts to Slack, stores message_ts in DynamoDB.
      Environment:
        Variables:
          TABLE_NAME: !Ref MenuMessageTable
          PARAMETER_PREFIX: /slack-dishes
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes/*'
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt MenuMessageTable.Arn
      Events:
        PostMenuSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(30 2 * * ? *)
            Name: post-menu-daily
            Description: Invoke PostMenu at 9:30 GMT+7 (VNT)
            Enabled: true

  CollectOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-dishes-collect-orders
      CodeUri: ../serverless/collect-orders
      Handler: index.handler
      Description: Runs at 10:20 GMT+7 (VNT); reads menu message from DynamoDB, calls reactions.get, resolves user_id to name (users.list), writes orders to Google Sheet by user row.
      Environment:
        Variables:
          TABLE_NAME: !Ref MenuMessageTable
          PARAMETER_PREFIX: /slack-dishes
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/slack-dishes/*'
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt MenuMessageTable.Arn
      Events:
        CollectOrdersSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(20 3 * * ? *)
            Name: collect-orders-daily
            Description: Invoke CollectOrders at 10:20 GMT+7 (VNT)
            Enabled: true

Outputs:
  MenuMessageTableName:
    Description: DynamoDB table for menu message metadata
    Value: !Ref MenuMessageTable
    Export:
      Name: !Sub '${AWS::StackName}-MenuMessageTable'
  PostMenuFunctionArn:
    Description: PostMenu Lambda ARN
    Value: !GetAtt PostMenuFunction.Arn
  CollectOrdersFunctionArn:
    Description: CollectOrders Lambda ARN
    Value: !GetAtt CollectOrdersFunction.Arn
